<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>second card</title>
</head>
<body>
    <style>
        /*hey   */
        
            *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
                /* ji */

        }
        .container{
            width:100vw;
            height: 100vh;
            background-color: #94BBE9;
            background-image: linear-gradient(90deg,rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        
        }
        .card{
            width: 400px;
            height: 600px;
            background-color: white;
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card img{
            width: 100%;
            height: 30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;

        }
        .textbox{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 70%;
            text-align: center;
        }
        #amountbox{
                width: 80%;
                height: 10%;
                background-color: #6fa7e6;
                border-radius: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                 padding-right: 20px;
                 padding-left: 20px;
padding: 5px 85px;
border-radius: 20px;
        }
        #leftbox{
            height: 100%;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .imgbox img{
            height: 3.5rem;
            width: 3.5rem;

        }
            
        
        #paymentbutton{
            width:80%;
            height: 9%;
            background-color: blue;
            color: white;
             border-radius: 10px;
            
        }
        .cancelbox a{
            text-decoration: none;
            color: grey;
            font-weight: bold;
        }
    </style>
    <div class="container">
       <div class="card">
          <img
          src="icon.jpg"
          />
          <div class="textbox">
             <h2>
            Order summary
          </h2>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Vero inventore quasi soluta exercitationem earum adipisci aut dignissimos,
             voluptatibus quam commodi?
          </p>
          </div>
          <br>
          <div id="amountbox">
               <div id="leftbox">
                  <div class="imgbox">
                    <img
                     src="music icon.jpg"
                    />
                  </div>
                  <div id="textamount">
                    <p>Amount</p>
                    <p>$99.9/year</p>
                  </div>
               </div>
               <div class="rightbox">
                <a href="#">change</a>
               </div>
          </div>
          <br>
           <button id="paymentbutton">
               proceed to payment
           </button>
           <br>
          <div class="cancelbox">
            <a href="#">cancel order</a>
          </div>
       </div>
    </div>
</body>
</html>
